<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <text x="60" y="120" fill="#eaeaea" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="bold">
    MuJoCo Dexterous Hand Benchmark
  </text>
  <text x="60" y="170" fill="#a0a0b0" font-family="Helvetica, Arial, sans-serif" font-size="22">
    9 manipulation tasks · MuJoCo 3.x · Gymnasium · SAC / PPO baselines
  </text>
  <rect x="60" y="200" width="400" height="6" fill="url(#accent)" rx="3"/>
  <!-- Stylised hand -->
  <g transform="translate(850, 80)" fill="#d4a574" stroke="#8b6914" stroke-width="1.5">
    <rect x="-30" y="40" width="80" height="50" rx="8" fill="#c4956a"/>
    <rect x="55" y="20" width="12" height="50" rx="6"/>
    <rect x="38" y="5" width="12" height="65" rx="6"/>
    <rect x="21" y="10" width="12" height="60" rx="6"/>
    <rect x="4" y="18" width="12" height="52" rx="6"/>
    <rect x="-20" y="35" width="35" height="12" rx="6" transform="rotate(-30 -20 35)"/>
  </g>
  <circle cx="920" cy="130" r="18" fill="#e94560" opacity="0.8"/>
  <text x="60" y="260" fill="#606080" font-family="Helvetica, Arial, sans-serif" font-size="14">
    github.com/SameerSphere/mujoco-dex-bench
  </text>
