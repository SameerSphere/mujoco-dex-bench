name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libosmesa6-dev
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          MUJOCO_GL: osmesa
        run: pytest tests/ -v --cov=mujoco_dex_bench --cov-report=term-missing
